version: '3.8'

services:
  claude-launcher:
    build: .
    container_name: claude-launcher-web
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - launcher-data:/app/data
      - claude-config:/root/.claude
    environment:
      - PORT=3001
      - NODE_ENV=production
      - TERM=xterm-256color
      - FORCE_COLOR=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  launcher-data:
  claude-config:
