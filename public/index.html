<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Launcher</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat-view.css">
  <script>
    // Dynamic base path for reverse proxy support (e.g. /launcher/)
    (function() {
      var base = document.createElement('base');
      base.href = location.pathname.substring(0, location.pathname.lastIndexOf('/') + 1) || '/';
      document.head.appendChild(base);
    })();
  </script>
  <script type="importmap">
  { "imports":
    {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1>Claude Launcher</h1>
      </div>
      <div class="nav-links">
        <a href="#profiles" class="nav-link active" data-page="profiles">
          <span class="nav-icon">&#9881;</span> Projetos
        </a>
        <a href="#active" class="nav-link" data-page="active">
          <span class="nav-icon">&#9654;</span> Ativas
          <span id="active-count" class="badge" style="display:none">0</span>
        </a>
        <a href="#history" class="nav-link" data-page="history">
          <span class="nav-icon">&#128196;</span> Historico
        </a>
        <a href="#schedules" class="nav-link" data-page="schedules">
          <span class="nav-icon">&#128339;</span> Agendamentos
        </a>
        <a href="#files" class="nav-link" data-page="files">
          <span class="nav-icon">&#128193;</span> Arquivos
        </a>
        <a href="#skills" class="nav-link" data-page="skills">
          <span class="nav-icon">&#128296;</span> Skills
        </a>
        <a href="#voice-manager" class="nav-link" data-page="voice-manager">
          <span class="nav-icon">&#127908;</span> Voice Manager
        </a>
        <a href="#marketplace" class="nav-link" data-page="marketplace">
          <span class="nav-icon">&#128722;</span> Marketplace
        </a>
        <a href="#workflows" class="nav-link" data-page="workflows">
          <span class="nav-icon">&#128736;</span> Workflows
        </a>
        <a href="#claude-agents" class="nav-link" data-page="claude-agents">
          <span class="nav-icon">&#9883;</span> Agentes
        </a>
        <a href="#config" class="nav-link" data-page="config">
          <span class="nav-icon">&#128295;</span> Configuracao
        </a>
      </div>
      <div class="sidebar-footer">
        <span class="status-dot" id="server-status"></span>
        <span id="server-status-text">Conectando...</span>
      </div>
    </nav>

    <button id="sidebar-toggle" class="sidebar-toggle">&#9776;</button>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <main id="content">
      <!-- Pages rendered here by JS -->
    </main>

    <!-- Terminal overlay (fullscreen) -->
    <div id="terminal-overlay" style="display:none">
      <div class="terminal-header">
        <button id="terminal-back" class="btn btn-sm">&larr; Voltar</button>
        <span id="terminal-title">Sessao</span>
        <span id="watcher-indicator" style="display:none;color:#a6e3a1;font-size:12px;margin-left:8px"></span>
        <button id="terminal-stop" class="btn btn-sm btn-danger">Parar</button>
      </div>
      <div id="terminal-container"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/preact@10.19.3/dist/preact.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js"></script>
  <script src="js/api.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/chat-view.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
